    <link rel="stylesheet" crossorigin href="./assets/index-DkW2eRVb.css">

  <body>
    <div id="root"></div>
    <script>
      const isGitHubPages = window.location.hostname.endsWith("github.io");

      if (isGitHubPages) {
        const alreadyInBuiltSite = window.location.pathname.endsWith("/dist/");
        if (!alreadyInBuiltSite) {
          const normalizedPath = window.location.pathname.endsWith("/")
            ? window.location.pathname
            : `${window.location.pathname}/`;
          const targetPath = `${normalizedPath}dist/`;

          window.location.replace(
            `${window.location.origin}${targetPath}${window.location.search}${window.location.hash}`,
          );
        }
      }
    </script>
  </body>
